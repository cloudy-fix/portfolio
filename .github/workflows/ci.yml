name: CI

on:
  push:
  pull_request:

jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate static site files
        run: |
          test -f index.html
          test -f projects.html
          test -d assets
          grep -q "Hariharan" index.html
          grep -q "Project Repository Hub" projects.html
          grep -q "project-card" projects.html
